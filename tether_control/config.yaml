name: "Tether Control"
version: "2.0.1"
slug: "tether_control"
description: "Tether Control for Home Assistant."
url: "https://github.com/ParksideTechnologies/tethercontrol"
webui: "http://[HOST]:[PORT:5180]"
startup: services
boot: auto
init: false
arch:
  - aarch64
host_network: true
uart: true
usb: true
udev: true
gpio: true
devices:
  - /dev/gpiochip0
apparmor: true
privileged:
  - SYS_RAWIO
options:
  ui_port: 5180
  licence_key: ""
schema:
  ui_port: port
  licence_key: str
